# ==============================
# APPLICATION
# ==============================
spring.application.name=internova-api

# ==============================
# SERVER
# ==============================
server.port=${PORT:8080}
server.address=0.0.0.0

# ==============================
# DATABASE - FIXED WITH YOUR POOLER
# ==============================
# Use your EXACT pooler URL but WITHOUT user/password parameters
# When deploying (e.g., Railway), prefer setting these via environment variables.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:5432/postgres?sslmode=require}

# Set credentials separately (NOT in the URL)
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.ignktnlegjtrmwkeqjmt}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Winnerbonnie@2004}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# HIKARICP - CRITICAL STABILITY SETTINGS
# ==============================
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000        # 30 minutes
spring.datasource.hikari.idle-timeout=600000         # 10 minutes
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.leak-detection-threshold=60000

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=true

# ==============================
# JWT SECURITY
# ==============================
# This secret must be set in your deployment platform (Railway/GitHub) for security.
internova.security.jwt-secret=${INTERNOVA_SECURITY_JWT_SECRET:MTg0MjViZTQtZDdiMy00NDgzLWEwZjctNTFjYzRlODQ3ZDI0MzQ0N2FiN2ItN2JhYi00MzViLWI4ZjYtZDRjOTM2NTkyOTg4}
internova.security.jwt-expiration-ms=${INTERNOVA_SECURITY_JWT_EXPIRATION_MS:86400000}

# ==============================
# LOGBOOK SETTINGS
# ==============================
internova.logbook.submission-window-hours=48

# ==============================
# INTERNAL SERVICES
# ==============================
# When deployed, point this at your AI microservice (or keep it local for development).
internova.brain.url=${INTERNOVA_BRAIN_URL:http://localhost:8000}

# This secret is used to secure the /api/v1/webhooks/brain endpoint.
internova.webhook.secret=${INTERNOVA_WEBHOOK_SECRET:super-secret-internal-brain-token-2026}

# ==============================
# FILE STORAGE
# ==============================
# When running on Railway, uploaded files are stored in the container volume. For real persistence,
# use an external object storage provider and update StorageService implementation.
internova.storage.upload-dir=${INTERNOVA_STORAGE_UPLOAD_DIR:uploads}
internova.storage.public-base-url=${INTERNOVA_STORAGE_PUBLIC_BASE_URL:http://localhost:8080}

# ==============================
# FRONTEND (CORS)
# ==============================
# Comma-separated list of allowed origins.
internova.frontend.urls=${INTERNOVA_FRONTEND_URLS:http://localhost:3000,http://localhost:5173,http://localhost:4173,https://internova-frontend.netlify.app,https://internova-frontend.vercel.app,https://internov.netlify.app}